<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GalaxyBlitz</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game-container">

    <div class="top-bar">

        <div>
            <h1>GalaxyBlitz</h1>
            <p class="subtitle">
                Neon Space Shooter
            </p>
        </div>

        <h2 class="score-text">
            Score: 0
        </h2>

    </div>

    <canvas
        id="gameCanvas"
        width="420"
        height="650"
    ></canvas>

    <div class="info-box">
        <p>⬅️ ➡️ Move</p>
        <p>SPACE = Shoot</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
